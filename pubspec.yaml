name: service_hub
description: "ServiceHub - Browse and book home services"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Network images with caching
  cached_network_image: ^3.4.1

  # Loading skeleton shimmer effect
  shimmer: ^3.0.0

  # Local key-value storage
  shared_preferences: ^2.3.4

  # Google Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
